<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>StudioManfra - Demo Gestionale</title>
  <meta name="description" content="Demo gestionale StudioManfra" />
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @keyframes slideUpFade {
      0% { opacity: 0; transform: translateY(15px); }
      100% { opacity: 1; transform: translateY(0); }
    }

    @keyframes fadeInContent {
      from { opacity: 0; transform: translateY(5px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .animate-slideUpFade { animation: slideUpFade 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
    .animate-fadeInContent { animation: fadeInContent 0.4s ease-out forwards; }

    html, body {
      height: 100%;
      margin: 0;
      background: #f9fafb;
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    .icon {
      width: 1.25rem;
      height: 1.25rem;
      stroke: currentColor;
      fill: none;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
      display: inline-block;
      vertical-align: middle;
      flex-shrink: 0;
    }

    .icon-sm { width: 1rem; height: 1rem; }
    .icon-lg { width: 1.5rem; height: 1.5rem; }
    .icon-xl { width: 2rem; height: 2rem; }
    .icon-xxl { width: 2.375rem; height: 2.375rem; }
  </style>
</head>
<body class="bg-gray-50 text-gray-900">
  <div id="app" class="h-full"></div>

  <script>
    const mockAppointments = [
      {
        id: 1,
        time: "09:00",
        duration: 60,
        patient: "Giulia Rossi",
        age: 34,
        reason: "Prima Visita Nutrizionale",
        anamnesis: true,
        newDocs: 2,
        status: "confirmed",
        redFlags: "Allergia al Nichel, Lieve intolleranza al lattosio",
        history: [
          { id: 101, title: "Esami del sangue completi", date: "10 Apr 2026", type: "Lab" },
          { id: 102, title: "Dieta Precedente", date: "05 Gen 2026", type: "Doc" }
        ]
      },
      {
        id: 2,
        time: "10:30",
        duration: 30,
        patient: "Marco Bianchi",
        age: 45,
        reason: "Controllo Mensile",
        anamnesis: true,
        newDocs: 0,
        status: "confirmed",
        redFlags: "Ipertensione in trattamento",
        history: [
          { id: 103, title: "Piano Nutrizionale Attuale", date: "15 Mar 2026", type: "Plan" }
        ]
      },
      {
        id: 3,
        time: "11:30",
        duration: 60,
        patient: "Elena Verdi",
        age: 28,
        reason: "Visita Sportiva",
        anamnesis: false,
        newDocs: 1,
        status: "pending",
        redFlags: null,
        history: [
          { id: 104, title: "Bioimpedenziometria base", date: "12 Apr 2026", type: "Bio" }
        ]
      }
    ];

    const mockPatients = [
      { id: 1, name: "Giulia Rossi", age: 34, phone: "+39 340 1122334", status: "Attivo" },
      { id: 2, name: "Marco Bianchi", age: 45, phone: "+39 333 4455667", status: "Attivo" },
      { id: 3, name: "Elena Verdi", age: 28, phone: "+39 392 9988776", status: "Attivo" }
    ];

    let state = {
      showSplash: true,
      currentView: "dashboard",
      selectedAppt: null,
      selectedDoc: null,
      requests: [
        { id: 1, date: "18 Apr 2026", time: "15:00", patient: "Luca Neri", phone: "+39 333 1234567", type: "Prima Visita" },
        { id: 2, date: "19 Apr 2026", time: "09:30", patient: "Sofia Colombo", phone: "+39 333 9876543", type: "Controllo" }
      ],
      toast: "",
      bookingStep: 1,
      bookingService: "Prima Visita Nutrizionale",
      bookingForm: { name: "", phone: "" }
    };

    function initials(name) {
      return name.split(" ").map(x => x[0]).join("").slice(0, 2).toUpperCase();
    }

    function todayLabel() {
      return new Intl.DateTimeFormat("it-IT", {
        weekday: "long",
        day: "numeric",
        month: "long",
        year: "numeric"
      }).format(new Date());
    }

    function showToast(message, duration = 3000) {
      state.toast = message;
      render();
      clearTimeout(window.__toastTimer);
      window.__toastTimer = setTimeout(() => {
        state.toast = "";
        render();
      }, duration);
    }

    function icon(name, cls = "icon") {
      const icons = {
        calendar: `
          <svg class="${cls}" viewBox="0 0 24 24">
            <path d="M8 2v4"></path>
            <path d="M16 2v4"></path>
            <rect x="3" y="4" width="18" height="18" rx="2"></rect>
            <path d="M3 10h18"></path>
          </svg>
        `,
        users: `
          <svg class="${cls}" viewBox="0 0 24 24">
            <path d="M16 21v-2a4 4 0 0 0-4-4H7a4 4 0 0 0-4 4v2"></path>
            <circle cx="9.5" cy="7" r="4"></circle>
            <path d="M20 21v-2a4 4 0 0 0-3-3.87"></path>
            <path d="M16.5 3.13a4 4 0 0 1 0 7.75"></path>
          </svg>
        `,
        bell: `
          <svg class="${cls}" viewBox="0 0 24 24">
            <path d="M15 17h5l-1.4-1.4A2 2 0 0 1 18 14.17V11a6 6 0 1 0-12 0v3.17a2 2 0 0 1-.6 1.43L4 17h5"></path>
            <path d="M9 17a3 3 0 0 0 6 0"></path>
          </svg>
        `,
        search: `
          <svg class="${cls}" viewBox="0 0 24 24">
            <circle cx="11" cy="11" r="7"></circle>
            <path d="M21 21l-4.3-4.3"></path>
          </svg>
        `,
        plus: `
          <svg class="${cls}" viewBox="0 0 24 24">
            <path d="M12 5v14"></path>
            <path d="M5 12h14"></path>
          </svg>
        `,
        stethoscope: `
          <svg class="${cls}" viewBox="0 0 24 24">
            <path d="M11 2v8a4 4 0 0 1-8 0V2"></path>
            <path d="M5 2v8"></path>
            <path d="M8 2v8"></path>
            <path d="M19 5a3 3 0 0 1 0 6h-1a3 3 0 0 0-3 3v1a4 4 0 0 1-8 0v-1"></path>
            <circle cx="19" cy="8" r="3"></circle>
          </svg>
        `,
        checkcircle: `
          <svg class="${cls}" viewBox="0 0 24 24">
            <circle cx="12" cy="12" r="10"></circle>
            <path d="m9 12 2 2 4-4"></path>
          </svg>
        `,
        paperclip: `
          <svg class="${cls}" viewBox="0 0 24 24">
            <path d="m21.44 11.05-8.49 8.49a5 5 0 0 1-7.07-7.07l8.49-8.49a3.5 3.5 0 0 1 4.95 4.95l-8.5 8.49a2 2 0 0 1-2.83-2.83l7.78-7.78"></path>
          </svg>
        `,
        x: `
          <svg class="${cls}" viewBox="0 0 24 24">
            <path d="M18 6 6 18"></path>
            <path d="m6 6 12 12"></path>
          </svg>
        `,
        alert: `
          <svg class="${cls}" viewBox="0 0 24 24">
            <circle cx="12" cy="12" r="10"></circle>
            <path d="M12 8v4"></path>
            <path d="M12 16h.01"></path>
          </svg>
        `,
        file: `
          <svg class="${cls}" viewBox="0 0 24 24">
            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
            <path d="M14 2v6h6"></path>
            <path d="M16 13H8"></path>
            <path d="M16 17H8"></path>
            <path d="M10 9H8"></path>
          </svg>
        `,
        chevron: `
          <svg class="${cls}" viewBox="0 0 24 24">
            <path d="m9 18 6-6-6-6"></path>
          </svg>
        `,
        check: `
          <svg class="${cls}" viewBox="0 0 24 24">
            <path d="M20 6 9 17l-5-5"></path>
          </svg>
        `,
        activity: `
          <svg class="${cls}" viewBox="0 0 24 24">
            <path d="M22 12h-4l-3 7-4-14-3 7H2"></path>
          </svg>
        `,
        droplet: `
          <svg class="${cls}" viewBox="0 0 24 24">
            <path d="M12 2.7s6 6.2 6 10.3a6 6 0 1 1-12 0c0-4.1 6-10.3 6-10.3Z"></path>
          </svg>
        `,
        utensils: `
          <svg class="${cls}" viewBox="0 0 24 24">
            <path d="M4 3v8"></path>
            <path d="M6 3v8"></path>
            <path d="M5 11v10"></path>
            <path d="M10 3v7a4 4 0 0 1-4 4"></path>
            <path d="M15 3v18"></path>
            <path d="M19 3c0 4-2 6-4 6"></path>
          </svg>
        `
      };
      return icons[name] || "";
    }

    function dashboardView() {
      return `
        <div class="p-8 w-full max-w-6xl mx-auto animate-fadeInContent">
          <div class="flex justify-between items-center mb-8 gap-4">
            <div>
              <h1 class="text-2xl font-bold text-gray-800">Calendario Odierno</h1>
              <p class="text-gray-500 capitalize">${todayLabel()}</p>
            </div>
            <button class="bg-teal-800 text-white px-4 py-2 rounded-lg hidden md:flex items-center gap-2 shadow-sm hover:bg-teal-900 transition">
              ${icon("plus")} Nuovo Appuntamento
            </button>
          </div>

          <div class="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden">
            ${mockAppointments.map((appt, idx) => `
              <button data-open-appt="${appt.id}" class="w-full text-left flex items-stretch border-b border-gray-50 hover:bg-teal-50/30 transition ${idx === 0 ? 'border-l-4 border-l-teal-600' : 'border-l-4 border-l-transparent'}">
                <div class="w-24 md:w-32 p-4 md:p-6 flex flex-col justify-center items-center border-r border-gray-100 bg-slate-50/50">
                  <span class="text-base md:text-lg font-semibold text-gray-800">${appt.time}</span>
                  <span class="text-xs text-gray-500">${appt.duration} min</span>
                </div>
                <div class="p-4 md:p-6 flex-1 flex flex-col md:flex-row md:justify-between md:items-center gap-4">
                  <div class="min-w-0">
                    <div class="flex items-center gap-3 mb-1 flex-wrap">
                      <h3 class="text-lg font-semibold text-gray-900">${appt.patient}</h3>
                      <span class="text-sm text-gray-500 hidden md:inline">${appt.age} anni</span>
                      ${appt.status === "confirmed"
                        ? `<span class="bg-emerald-100 text-emerald-700 text-[10px] md:text-[11px] px-2 py-0.5 rounded-md font-medium uppercase tracking-wide">Confermato</span>`
                        : `<span class="bg-amber-100 text-amber-700 text-[10px] md:text-[11px] px-2 py-0.5 rounded-md font-medium uppercase tracking-wide">In attesa</span>`
                      }
                    </div>
                    <p class="text-gray-600 flex items-center gap-2 text-sm">
                      <span class="text-teal-600">${icon("stethoscope","icon icon-sm")}</span>
                      <span class="truncate">${appt.reason}</span>
                    </p>
                  </div>
                  <div class="flex gap-4 border-t border-gray-100 pt-4 md:border-0 md:pt-0">
                    ${appt.anamnesis ? `
                      <div class="flex flex-col items-center justify-center text-emerald-600">
                        ${icon("checkcircle","icon icon-lg")}
                        <span class="text-[9px] mt-1 font-semibold uppercase tracking-wider">Anamnesi</span>
                      </div>
                    ` : ""}
                    ${appt.newDocs > 0 ? `
                      <div class="flex flex-col items-center justify-center text-teal-600 relative">
                        ${icon("paperclip","icon icon-lg")}
                        <span class="absolute -top-1 -right-2 bg-rose-500 text-white text-[10px] w-4 h-4 flex items-center justify-center rounded-full font-bold shadow-sm">${appt.newDocs}</span>
                        <span class="text-[9px] mt-1 font-semibold uppercase tracking-wider">Referti</span>
                      </div>
                    ` : ""}
                  </div>
                </div>
              </button>
            `).join("")}
          </div>
        </div>
      `;
    }

    function secretaryView() {
      return `
        <div class="p-8 w-full max-w-6xl mx-auto animate-fadeInContent overflow-x-auto">
          <div class="mb-8"><h1 class="text-2xl font-bold text-gray-800">Coda di Lavoro</h1></div>
          <div class="bg-white rounded-2xl shadow-sm border border-gray-100 min-w-[600px]">
            <table class="w-full text-left border-collapse">
              <thead class="bg-slate-50 border-b border-gray-100 text-xs font-semibold text-slate-500 uppercase">
                <tr>
                  <th class="p-4 pl-6">Data</th>
                  <th class="p-4">Paziente</th>
                  <th class="p-4">Contatto</th>
                  <th class="p-4 text-right">Azioni</th>
                </tr>
              </thead>
              <tbody class="divide-y divide-gray-50">
                ${state.requests.map(req => `
                  <tr class="hover:bg-slate-50/50 transition">
                    <td class="p-4 pl-6">
                      <div class="font-semibold">${req.date}</div>
                      <div class="text-sm text-gray-500">${req.time}</div>
                    </td>
                    <td class="p-4 font-medium">${req.patient}</td>
                    <td class="p-4 text-gray-600">${req.phone}</td>
                    <td class="p-4 text-right">
                      <div class="flex justify-end gap-2">
                        <button data-approve="${req.id}" class="w-9 h-9 rounded-full bg-emerald-50 text-emerald-600 flex items-center justify-center hover:bg-emerald-500 hover:text-white border border-emerald-100">${icon("check","icon icon-sm")}</button>
                        <button data-reject="${req.id}" class="w-9 h-9 rounded-full bg-white text-gray-400 flex items-center justify-center hover:bg-gray-100 hover:text-gray-700 border border-gray-200">${icon("x","icon icon-sm")}</button>
                      </div>
                    </td>
                  </tr>
                `).join("")}
              </tbody>
            </table>
            ${state.requests.length === 0 ? `<div class="p-12 text-center text-gray-500">Nessuna richiesta in sospeso.</div>` : ""}
          </div>
        </div>
      `;
    }

    function patientsView() {
      return `
        <div class="p-8 w-full max-w-6xl mx-auto animate-fadeInContent overflow-x-auto">
          <div class="mb-8"><h1 class="text-2xl font-bold text-gray-800">Archivio Pazienti</h1></div>
          <div class="bg-white rounded-2xl shadow-sm border border-gray-100 min-w-[600px]">
            <table class="w-full text-left border-collapse">
              <thead class="bg-slate-50 border-b border-gray-100 text-xs font-semibold text-slate-500 uppercase">
                <tr>
                  <th class="p-4 pl-6">Nome Paziente</th>
                  <th class="p-4">Contatto</th>
                  <th class="p-4">Età</th>
                  <th class="p-4 text-right">Stato</th>
                </tr>
              </thead>
              <tbody class="divide-y divide-gray-50">
                ${mockPatients.map(patient => `
                  <tr class="hover:bg-teal-50/30 transition">
                    <td class="p-4 pl-6 font-semibold">${patient.name}</td>
                    <td class="p-4 text-sm text-gray-600">${patient.phone}</td>
                    <td class="p-4 text-sm text-gray-600">${patient.age} anni</td>
                    <td class="p-4 text-right">
                      <span class="bg-emerald-50 text-emerald-700 px-2 py-1 rounded text-xs font-semibold">${patient.status}</span>
                    </td>
                  </tr>
                `).join("")}
              </tbody>
            </table>
          </div>
        </div>
      `;
    }

    function widgetView() {
      const step = state.bookingStep;
      const service = state.bookingService;
      const form = state.bookingForm;

      return `
        <div class="flex-1 flex items-center justify-center bg-slate-100 p-4 animate-fadeInContent w-full">
          <div class="w-full max-w-md bg-white rounded-[2rem] shadow-2xl overflow-hidden border border-slate-200/60">
            <div class="bg-teal-800 p-6 md:p-8 text-white text-center flex flex-col items-center relative overflow-hidden">
              <div class="absolute top-0 right-0 -mt-4 -mr-4 w-32 h-32 bg-teal-700 rounded-full blur-2xl opacity-50"></div>
              <div class="w-16 h-16 bg-white/10 backdrop-blur-md rounded-2xl flex items-center justify-center mb-4 border border-white/20 shadow-inner z-10">
                ${icon("calendar","icon icon-xl")}
              </div>
              <h2 class="text-2xl font-bold tracking-tight z-10">StudioManfra</h2>
            </div>

            <div class="p-6 md:p-8 space-y-6 min-h-[400px] relative">
              ${step === 1 ? `
                <div class="animate-fadeInContent">
                  <div>
                    <label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-3 block">1. Seleziona Prestazione</label>
                    <div class="space-y-3">
                      <button data-service="Prima Visita Nutrizionale" class="w-full flex items-center justify-between p-4 border-2 rounded-2xl transition ${service === 'Prima Visita Nutrizionale' ? 'border-teal-600 bg-teal-50' : 'border-slate-100 hover:border-slate-300'}">
                        <span class="font-semibold block text-sm ${service === 'Prima Visita Nutrizionale' ? 'text-teal-900' : 'text-slate-700'}">Prima Visita</span>
                        <div class="w-6 h-6 rounded-full flex items-center justify-center ${service === 'Prima Visita Nutrizionale' ? 'bg-teal-600 text-white' : 'border-2 border-slate-200'}">
                          ${service === 'Prima Visita Nutrizionale' ? icon("check","icon icon-sm") : ""}
                        </div>
                      </button>
                      <button data-service="Visita di Controllo" class="w-full flex items-center justify-between p-4 border-2 rounded-2xl transition ${service === 'Visita di Controllo' ? 'border-teal-600 bg-teal-50' : 'border-slate-100 hover:border-slate-300'}">
                        <span class="font-semibold block text-sm ${service === 'Visita di Controllo' ? 'text-teal-900' : 'text-slate-700'}">Visita di Controllo</span>
                        <div class="w-6 h-6 rounded-full flex items-center justify-center ${service === 'Visita di Controllo' ? 'bg-teal-600 text-white' : 'border-2 border-slate-200'}">
                          ${service === 'Visita di Controllo' ? icon("check","icon icon-sm") : ""}
                        </div>
                      </button>
                    </div>
                  </div>

                  <div class="mt-6">
                    <label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-3 block">2. I tuoi Dati</label>
                    <div class="space-y-3">
                      <input id="booking-name" type="text" placeholder="Nome e Cognome" value="${form.name}" class="w-full p-4 bg-slate-50 border border-slate-200 rounded-2xl text-sm outline-none" />
                      <input id="booking-phone" type="tel" placeholder="Cellulare" value="${form.phone}" class="w-full p-4 bg-slate-50 border border-slate-200 rounded-2xl text-sm outline-none" />
                    </div>
                  </div>

                  <button id="submit-booking" class="w-full bg-teal-800 text-white font-bold py-4 rounded-2xl shadow-lg mt-6 hover:bg-teal-900 transition">Invia</button>
                </div>
              ` : `
                <div class="absolute inset-0 flex flex-col items-center justify-center p-8 text-center animate-slideUpFade bg-white rounded-b-[2rem]">
                  <div class="w-20 h-20 bg-emerald-100 rounded-full flex items-center justify-center text-emerald-500 mb-6">
                    ${icon("checkcircle","icon icon-xxl")}
                  </div>
                  <h3 class="text-2xl font-bold text-slate-800 mb-2">Inviata!</h3>
                  <button id="new-booking" class="mt-8 px-6 py-3 bg-slate-100 text-slate-600 font-semibold rounded-xl hover:bg-slate-200 transition">Nuova richiesta</button>
                </div>
              `}
            </div>
          </div>
        </div>
      `;
    }

    function slideOver() {
      const appt = state.selectedAppt;
      if (!appt) return "";

      return `
        <div class="fixed inset-0 z-40 flex justify-end">
          <div class="absolute inset-0 bg-slate-900/20 backdrop-blur-sm" data-close-appt="1"></div>
          <div class="relative w-full max-w-md bg-white h-full shadow-2xl flex flex-col">
            <div class="p-6 border-b border-gray-100 flex justify-between items-start bg-slate-50/50">
              <div class="flex items-center gap-4 min-w-0">
                <div class="w-12 h-12 md:w-14 md:h-14 bg-white border border-teal-100 shadow-sm rounded-full flex items-center justify-center text-teal-800 font-bold text-xl">
                  ${initials(appt.patient)}
                </div>
                <div>
                  <h2 class="text-xl font-bold text-gray-900">${appt.patient}</h2>
                  <p class="text-sm text-gray-500">${appt.age} anni • ${appt.reason}</p>
                </div>
              </div>
              <button data-close-appt="1" class="p-2 text-gray-400 hover:bg-gray-200 rounded-full transition">${icon("x")}</button>
            </div>

            <div class="flex-1 overflow-y-auto p-6 space-y-6">
              ${appt.redFlags ? `
                <div class="bg-rose-50 border border-rose-100 rounded-xl p-4 flex gap-3 items-start shadow-sm">
                  <span class="text-rose-600">${icon("alert")}</span>
                  <div>
                    <h4 class="text-sm font-semibold text-rose-800 mb-1">Attenzione Medica</h4>
                    <p class="text-sm text-rose-700 leading-snug">${appt.redFlags}</p>
                  </div>
                </div>
              ` : ""}

              <div>
                <h3 class="font-semibold text-gray-900 flex items-center gap-2 mb-4">
                  <span class="text-teal-800">${icon("file","icon icon-sm")}</span> Documenti & Referti
                </h3>
                <div class="space-y-3">
                  ${appt.history.map(doc => `
                    <button data-open-doc="${doc.id}" class="group w-full text-left flex items-center justify-between p-3 rounded-xl border border-gray-100 hover:border-teal-200 hover:bg-teal-50 transition shadow-sm">
                      <div class="flex items-center gap-3">
                        <div class="bg-white border border-gray-100 shadow-sm p-2 rounded-lg text-gray-500 group-hover:text-teal-600">
                          ${
                            doc.type === 'Lab' ? icon('droplet','icon icon-sm') :
                            doc.type === 'Plan' ? icon('utensils','icon icon-sm') :
                            doc.type === 'Bio' ? icon('activity','icon icon-sm') :
                            icon('file','icon icon-sm')
                          }
                        </div>
                        <div>
                          <p class="text-sm font-medium text-gray-800">${doc.title}</p>
                          <p class="text-xs text-gray-500">${doc.date}</p>
                        </div>
                      </div>
                      <span class="text-gray-300 group-hover:text-teal-600">${icon("chevron","icon icon-sm")}</span>
                    </button>
                  `).join("")}
                </div>
              </div>
            </div>

            <div class="p-6 border-t border-gray-100 bg-white">
              <button data-close-appt="1" class="w-full bg-teal-800 text-white font-medium py-3.5 rounded-xl shadow-md hover:bg-teal-900 transition flex justify-center items-center gap-2">
                ${icon("check","icon icon-sm")} Salva e Chiudi Visita
              </button>
            </div>
          </div>
        </div>
      `;
    }

    function lightbox() {
      const doc = state.selectedDoc;
      if (!doc) return "";

      let content = "";
      if (doc.type === "Bio") {
        content = `
          <div class="w-full max-w-2xl text-left animate-fadeInContent">
            <div class="flex items-center gap-3 mb-6 border-b pb-4">
              <span class="text-teal-600">${icon("activity","icon icon-lg")}</span>
              <h2 class="text-2xl font-bold text-gray-800">Analisi Corporea</h2>
            </div>
            <div class="space-y-6">
              <div><div class="flex justify-between text-sm font-semibold mb-2"><span class="text-slate-700">Massa Grassa (FM)</span><span class="text-rose-600">24.5 %</span></div><div class="w-full bg-slate-100 h-4 rounded-full overflow-hidden"><div class="bg-rose-500 h-full" style="width:24.5%"></div></div></div>
              <div><div class="flex justify-between text-sm font-semibold mb-2"><span class="text-slate-700">Massa Magra (FFM)</span><span class="text-emerald-600">75.5 %</span></div><div class="w-full bg-slate-100 h-4 rounded-full overflow-hidden"><div class="bg-emerald-500 h-full" style="width:75.5%"></div></div></div>
              <div><div class="flex justify-between text-sm font-semibold mb-2"><span class="text-slate-700">Acqua Totale (TBW)</span><span class="text-blue-500">58.0 %</span></div><div class="w-full bg-slate-100 h-4 rounded-full overflow-hidden"><div class="bg-blue-500 h-full" style="width:58%"></div></div></div>
            </div>
          </div>
        `;
      } else if (doc.type === "Plan") {
        content = `
          <div class="w-full max-w-3xl text-left animate-fadeInContent">
            <div class="flex items-center gap-3 mb-6 border-b pb-4">
              <span class="text-emerald-600">${icon("utensils","icon icon-lg")}</span>
              <h2 class="text-2xl font-bold text-gray-800">Piano Nutrizionale</h2>
            </div>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
              <div class="p-4 border border-slate-200 rounded-xl bg-slate-50"><h4 class="font-bold text-slate-800 mb-2">Colazione</h4><ul class="text-sm text-slate-600 space-y-1 list-disc pl-5"><li>Yogurt Greco 0% (150g)</li><li>Fiocchi d'avena (40g)</li></ul></div>
              <div class="p-4 border border-slate-200 rounded-xl bg-slate-50"><h4 class="font-bold text-slate-800 mb-2">Spuntino</h4><ul class="text-sm text-slate-600 space-y-1 list-disc pl-5"><li>Mandorle (15g)</li></ul></div>
              <div class="p-4 border border-slate-200 rounded-xl bg-slate-50 md:col-span-2"><h4 class="font-bold text-slate-800 mb-2">Pranzo</h4><ul class="text-sm text-slate-600 space-y-1 list-disc pl-5"><li>Riso basmati (70g)</li><li>Pollo ai ferri (150g)</li><li>Zucchine grigliate</li></ul></div>
            </div>
          </div>
        `;
      } else {
        content = `
          <div class="w-full max-w-2xl text-left animate-fadeInContent">
            <div class="flex items-center gap-3 mb-6 border-b pb-4">
              <span class="text-red-500">${icon("droplet","icon icon-lg")}</span>
              <h2 class="text-2xl font-bold text-gray-800">Esami Ematochimici</h2>
            </div>
            <table class="w-full text-sm text-left">
              <thead class="bg-slate-100 text-slate-600">
                <tr><th class="p-3">Esame</th><th class="p-3">Esito</th><th class="p-3 hidden md:table-cell">Riferimento</th></tr>
              </thead>
              <tbody class="divide-y divide-slate-100">
                <tr><td class="p-3">Glicemia</td><td class="p-3 font-bold">85 mg/dL</td><td class="p-3 hidden md:table-cell">70 - 100</td></tr>
                <tr><td class="p-3">Colesterolo</td><td class="p-3 font-bold text-rose-600">210 mg/dL *</td><td class="p-3 hidden md:table-cell">&lt; 200</td></tr>
              </tbody>
            </table>
          </div>
        `;
      }

      return `
        <div class="fixed inset-0 z-50 flex flex-col bg-slate-900/95 backdrop-blur-md">
          <div class="flex justify-between items-center p-4 bg-slate-900 border-b border-slate-700 text-white shadow-md">
            <div class="flex items-center gap-4">
              <button data-close-doc="1" class="p-2 hover:bg-slate-800 rounded-lg">${icon("x","icon icon-lg")}</button>
              <h3 class="font-medium text-sm md:text-base">${doc.title}.pdf</h3>
            </div>
          </div>
          <div class="flex-1 overflow-auto p-4 md:p-8 flex justify-center items-start pt-8">
            <div class="bg-white w-full max-w-4xl min-h-[500px] rounded-xl shadow-2xl p-6 md:p-12 flex flex-col items-center border border-gray-200">
              ${content}
            </div>
          </div>
        </div>
      `;
    }

    function splash() {
      if (!state.showSplash) return "";
      return `
        <div class="fixed inset-0 z-[100] bg-[#F9FAFB] flex flex-col items-center justify-center">
          <div class="flex flex-col items-center animate-slideUpFade text-center px-6">
            <div class="w-20 h-20 bg-white rounded-2xl flex items-center justify-center mb-6 shadow-sm border border-teal-100/50 text-teal-700">
              ${icon("calendar","icon icon-xxl")}
            </div>
            <h1 class="text-3xl font-bold text-slate-800 tracking-tight mb-3">StudioManfra</h1>
            <div class="w-8 h-0.5 bg-teal-600 rounded-full mb-3 opacity-80"></div>
            <p class="text-teal-700/70 text-xs font-semibold tracking-[0.2em] uppercase mb-8">EHR & Gestione Studio</p>
            <p class="text-lg md:text-xl text-slate-600 italic font-medium mb-10 max-w-sm leading-relaxed">"Sii la versione migliore di te stesso."</p>
            <button id="start-app" class="bg-teal-800 text-white px-10 py-4 rounded-2xl font-bold text-lg shadow-lg shadow-teal-900/20 hover:bg-teal-900 hover:-translate-y-1 transition-all duration-300 flex items-center gap-2">
              Inizia ${icon("chevron")}
            </button>
          </div>
        </div>
      `;
    }

    function toast() {
      return `
        <div class="fixed bottom-6 right-6 bg-slate-800 text-white px-6 py-4 rounded-2xl shadow-2xl flex items-center gap-3 transition-all duration-300 z-[110] ${state.toast ? 'translate-y-0 opacity-100' : 'translate-y-10 opacity-0 pointer-events-none'}">
          <span class="text-teal-400">${icon("checkcircle","icon icon-sm")}</span>
          <span class="font-medium">${state.toast || ""}</span>
        </div>
      `;
    }

    function renderMainView() {
      if (state.currentView === "dashboard") return dashboardView();
      if (state.currentView === "secretary") return secretaryView();
      if (state.currentView === "patients") return patientsView();
      return widgetView();
    }

    function render() {
      document.getElementById("app").innerHTML = `
        ${splash()}
        <div class="flex h-screen bg-[#F9FAFB] font-sans text-gray-900 w-full overflow-hidden">
          <nav class="w-64 bg-white border-r border-gray-200 flex-col hidden md:flex z-10 flex-shrink-0">
            <div class="p-6 border-b border-gray-100 flex items-center gap-3">
              <div class="w-8 h-8 rounded-lg bg-teal-800 text-white flex items-center justify-center">${icon("calendar","icon icon-sm")}</div>
              <span class="font-bold text-xl text-slate-800">StudioManfra</span>
            </div>
            <div class="p-4 flex-1 space-y-1">
              <p class="px-4 text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-3 mt-4">Gestione</p>
              <button data-view="dashboard" class="w-full flex items-center gap-3 px-4 py-3 rounded-xl transition ${state.currentView === 'dashboard' ? 'bg-teal-50 text-teal-800 font-semibold' : 'text-slate-600 hover:bg-slate-50'}">${icon("calendar","icon icon-sm")} Dashboard</button>
              <button data-view="secretary" class="w-full flex items-center gap-3 px-4 py-3 rounded-xl transition ${state.currentView === 'secretary' ? 'bg-teal-50 text-teal-800 font-semibold' : 'text-slate-600 hover:bg-slate-50'}">${icon("bell","icon icon-sm")} Coda Segreteria ${state.requests.length > 0 ? `<span class="ml-auto bg-rose-500 text-white text-[10px] px-2 py-0.5 rounded-full font-bold shadow-sm">${state.requests.length}</span>` : ""}</button>
              <button data-view="patients" class="w-full flex items-center gap-3 px-4 py-3 rounded-xl transition ${state.currentView === 'patients' ? 'bg-teal-50 text-teal-800 font-semibold' : 'text-slate-600 hover:bg-slate-50'}">${icon("users","icon icon-sm")} Pazienti</button>
              <p class="px-4 text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-3 mt-8">Test</p>
              <button data-view="widget" class="w-full flex items-center gap-3 px-4 py-3 rounded-xl transition ${state.currentView === 'widget' ? 'bg-slate-800 text-white font-semibold' : 'text-slate-600 hover:bg-slate-100 border border-slate-200'}">${icon("search","icon icon-sm")} Widget Paziente</button>
            </div>
          </nav>

          <main class="flex-1 flex flex-col h-screen overflow-hidden relative w-full">
            <div class="md:hidden p-4 bg-white border-b border-gray-200 flex justify-between items-center z-10">
              <div class="flex items-center gap-2">
                <div class="bg-teal-50 p-1.5 rounded-md text-teal-800">${icon("calendar","icon icon-sm")}</div>
                <span class="font-bold text-slate-800 truncate">StudioManfra</span>
              </div>
              <select id="mobile-view" class="bg-slate-50 border border-slate-200 rounded-lg p-2 text-sm outline-none font-medium ml-2">
                <option value="dashboard" ${state.currentView === 'dashboard' ? 'selected' : ''}>Dashboard</option>
                <option value="secretary" ${state.currentView === 'secretary' ? 'selected' : ''}>Segreteria</option>
                <option value="patients" ${state.currentView === 'patients' ? 'selected' : ''}>Pazienti</option>
                <option value="widget" ${state.currentView === 'widget' ? 'selected' : ''}>Widget</option>
              </select>
            </div>

            <div class="flex-1 overflow-y-auto bg-[#F9FAFB] w-full">
              ${renderMainView()}
            </div>
          </main>
        </div>

        ${slideOver()}
        ${lightbox()}
        ${toast()}
      `;

      bindEvents();
    }

    function bindEvents() {
      const start = document.getElementById("start-app");
      if (start) start.onclick = () => { state.showSplash = false; render(); };

      document.querySelectorAll("[data-view]").forEach(btn => {
        btn.onclick = () => {
          state.currentView = btn.dataset.view;
          render();
        };
      });

      const mobile = document.getElementById("mobile-view");
      if (mobile) {
        mobile.onchange = (e) => {
          state.currentView = e.target.value;
          render();
        };
      }

      document.querySelectorAll("[data-open-appt]").forEach(btn => {
        btn.onclick = () => {
          const appt = mockAppointments.find(a => a.id === Number(btn.dataset.openAppt));
          state.selectedAppt = appt;
          render();
        };
      });

      document.querySelectorAll("[data-close-appt]").forEach(btn => {
        btn.onclick = () => {
          state.selectedAppt = null;
          render();
        };
      });

      document.querySelectorAll("[data-open-doc]").forEach(btn => {
        btn.onclick = () => {
          const id = Number(btn.dataset.openDoc);
          const doc = state.selectedAppt?.history.find(d => d.id === id);
          state.selectedDoc = doc || null;
          render();
        };
      });

      document.querySelectorAll("[data-close-doc]").forEach(btn => {
        btn.onclick = () => {
          state.selectedDoc = null;
          render();
        };
      });

      document.querySelectorAll("[data-approve]").forEach(btn => {
        btn.onclick = () => {
          const id = Number(btn.dataset.approve);
          state.requests = state.requests.filter(req => req.id !== id);
          render();
          showToast("Richiesta approvata. Anamnesi inviata.");
        };
      });

      document.querySelectorAll("[data-reject]").forEach(btn => {
        btn.onclick = () => {
          const id = Number(btn.dataset.reject);
          state.requests = state.requests.filter(req => req.id !== id);
          render();
          showToast("Richiesta rifiutata e archiviata.");
        };
      });

      document.querySelectorAll("[data-service]").forEach(btn => {
        btn.onclick = () => {
          state.bookingService = btn.dataset.service;
          render();
        };
      });

      const submitBooking = document.getElementById("submit-booking");
      if (submitBooking) {
        submitBooking.onclick = () => {
          const name = document.getElementById("booking-name").value.trim();
          const phone = document.getElementById("booking-phone").value.trim();

          state.bookingForm.name = name;
          state.bookingForm.phone = phone;

          if (!name || !phone) {
            showToast("Inserisci almeno Nome e Cellulare");
            return;
          }

          const time = new Date().toLocaleTimeString("it-IT", { hour: "2-digit", minute: "2-digit" });
          state.requests.unshift({
            id: Date.now(),
            date: "Oggi",
            time,
            patient: name,
            phone,
            type: state.bookingService.includes("Prima") ? "Prima Visita" : "Controllo"
          });

          state.bookingStep = 2;
          render();
          showToast(`Nuova richiesta web ricevuta da ${name}`, 4000);
        };
      }

      const newBooking = document.getElementById("new-booking");
      if (newBooking) {
        newBooking.onclick = () => {
          state.bookingStep = 1;
          state.bookingForm = { name: "", phone: "" };
          render();
        };
      }
    }

    render();
  </script>
</body>
</html>
